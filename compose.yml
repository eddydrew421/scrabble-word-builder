services:
  api:
    build:
      context: .
      target: runtime
    image: scrabble-word-builder:local
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # BOARD_WORD_POLICY: contains-board-word-substring   # flip the rule
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true