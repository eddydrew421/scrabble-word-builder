name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: scrabble-word-builder:ci
      - name: Smoke test the container
        run: |
          docker run -d --name api -p 3000:3000 scrabble-word-builder:ci
          for i in {1..15}; do
            curl -sf http://127.0.0.1:3000/health && break || sleep 1
          done
          curl -sf -G http://127.0.0.1:3000/api/v1/solve \
            --data-urlencode 'rack=AIDOORW' --data-urlencode 'word=WIZ' \
          | grep -q WIZARD
          docker rm -f api